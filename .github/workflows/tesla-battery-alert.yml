name: Tesla Battery Alert

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes, 24/7
  workflow_dispatch:           # lets you trigger manually from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-battery:
    permissions:
      contents: write
      secrets: write
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Restore state
        uses: actions/cache/restore@v5
        with:
          path: |
            battery_state.json
              battery_history.json
          key: tesla-state-${{ github.run_id }}
          restore-keys: |
            tesla-state-

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check Tesla battery
        env:
          TESLA_CLIENT_ID:     ${{ secrets.TESLA_CLIENT_ID }}
          TESLA_CLIENT_SECRET: ${{ secrets.TESLA_CLIENT_SECRET }}
          TESLA_REFRESH_TOKEN: ${{ secrets.TESLA_REFRESH_TOKEN }}
          TESLA_VEHICLE_ID:    ${{ secrets.TESLA_VEHICLE_ID }}
          NTFY_TOPIC:          ${{ secrets.NTFY_TOPIC }}
        run: python battery_alert.py


      - name: Rotate refresh token secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f new_refresh_token.txt ]; then
            NEW_TOKEN=$(cat new_refresh_token.txt)
            if [ -n "$NEW_TOKEN" ]; then
              echo "$NEW_TOKEN" | gh secret set TESLA_REFRESH_TOKEN -R ${{ github.repository }}
              echo "✅ Refresh token rotated successfully"
            fi
          else
            echo "ℹ️  No new token file found (script may have failed before token exchange)"
          fi
      - name: Ensure history file exists
        if: always()
        run: test -f battery_history.json || echo '[]' > battery_history.json

      - name: Save state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            battery_state.json
              battery_history.json
          key: tesla-state-${{ github.run_id }}
